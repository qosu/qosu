<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" width="900" height="280">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#1a1025"/>
      <stop offset="60%" stop-color="#0d0820"/>
      <stop offset="100%" stop-color="#050510"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c4b5fd" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#c4b5fd" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowGold" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e9d5ff"/>
      <stop offset="35%" stop-color="#c4b5fd"/>
      <stop offset="65%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0"/>
      <stop offset="50%" stop-color="#a78bfa" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="280" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.03" stroke="#c4b5fd" stroke-width="0.5">
    <line x1="0" y1="70" x2="900" y2="70"/><line x1="0" y1="140" x2="900" y2="140"/><line x1="0" y1="210" x2="900" y2="210"/>
    <line x1="150" y1="0" x2="150" y2="280"/><line x1="300" y1="0" x2="300" y2="280"/><line x1="450" y1="0" x2="450" y2="280"/>
    <line x1="600" y1="0" x2="600" y2="280"/><line x1="750" y1="0" x2="750" y2="280"/>
  </g>

  <!-- Geometric rings -->
  <circle cx="450" cy="120" r="110" fill="none" stroke="#a78bfa" stroke-width="0.5" opacity="0.08">
    <animate attributeName="r" values="110;115;110" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.08;0.12;0.08" dur="8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="450" cy="120" r="140" fill="none" stroke="#818cf8" stroke-width="0.3" opacity="0.05">
    <animate attributeName="r" values="140;143;140" dur="11s" repeatCount="indefinite"/>
  </circle>
  <circle cx="450" cy="120" r="80" fill="none" stroke="#c4b5fd" stroke-width="0.4" opacity="0.06" stroke-dasharray="4 12"/>

  <!-- Constellation lines -->
  <g stroke="url(#lineGrad)" stroke-width="0.6" opacity="0.3">
    <line x1="220" y1="95" x2="310" y2="75"><animate attributeName="opacity" values="0.3;0.1;0.3" dur="5s" repeatCount="indefinite"/></line>
    <line x1="310" y1="75" x2="390" y2="60"><animate attributeName="opacity" values="0.1;0.3;0.1" dur="7s" repeatCount="indefinite"/></line>
    <line x1="390" y1="60" x2="500" y2="55"><animate attributeName="opacity" values="0.2;0.05;0.2" dur="6s" repeatCount="indefinite"/></line>
    <line x1="500" y1="55" x2="600" y2="65"><animate attributeName="opacity" values="0.1;0.3;0.1" dur="8s" repeatCount="indefinite"/></line>
    <line x1="600" y1="65" x2="700" y2="90"><animate attributeName="opacity" values="0.3;0.05;0.3" dur="5.5s" repeatCount="indefinite"/></line>
    <line x1="310" y1="75" x2="280" y2="130"><animate attributeName="opacity" values="0.05;0.2;0.05" dur="9s" repeatCount="indefinite"/></line>
    <line x1="500" y1="55" x2="530" y2="115"><animate attributeName="opacity" values="0.2;0.05;0.2" dur="7s" repeatCount="indefinite"/></line>
    <line x1="600" y1="65" x2="650" y2="125"><animate attributeName="opacity" values="0.1;0.2;0.1" dur="6.5s" repeatCount="indefinite"/></line>
  </g>

  <!-- Particles -->
  <g fill="#c4b5fd">
    <circle cx="220" cy="95" r="2.5"><animate attributeName="cy" values="95;100;95" dur="4s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.9;0.4;0.9" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="310" cy="75" r="2"><animate attributeName="cy" values="75;80;75" dur="5s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.7;0.2;0.7" dur="5s" repeatCount="indefinite"/></circle>
    <circle cx="390" cy="60" r="1.5"><animate attributeName="cy" values="60;55;60" dur="3.5s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.6;0.1;0.6" dur="3.5s" repeatCount="indefinite"/></circle>
    <circle cx="500" cy="55" r="3"><animate attributeName="cy" values="55;62;55" dur="6s" repeatCount="indefinite"/><animate attributeName="opacity" values="1;0.3;1" dur="6s" repeatCount="indefinite"/></circle>
    <circle cx="600" cy="65" r="2"><animate attributeName="cy" values="65;72;65" dur="4.5s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.8;0.2;0.8" dur="4.5s" repeatCount="indefinite"/></circle>
    <circle cx="700" cy="90" r="1.5"><animate attributeName="cy" values="90;98;90" dur="5.5s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.5;0.15;0.5" dur="5.5s" repeatCount="indefinite"/></circle>
    <circle cx="280" cy="130" r="1.8"><animate attributeName="cy" values="130;138;130" dur="7s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.6;0.1;0.6" dur="7s" repeatCount="indefinite"/></circle>
    <circle cx="530" cy="115" r="2.2"><animate attributeName="cy" values="115;108;115" dur="4.2s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.7;0.2;0.7" dur="4.2s" repeatCount="indefinite"/></circle>
    <circle cx="650" cy="125" r="1.5"><animate attributeName="cy" values="125;118;125" dur="6.8s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.5;0.15;0.5" dur="6.8s" repeatCount="indefinite"/></circle>
    <circle cx="170" cy="60" r="1.2"><animate attributeName="cy" values="60;50;60" dur="9s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.4;0.05;0.4" dur="9s" repeatCount="indefinite"/></circle>
    <circle cx="750" cy="50" r="1.8"><animate attributeName="cy" values="50;42;50" dur="7.5s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.5;0.1;0.5" dur="7.5s" repeatCount="indefinite"/></circle>
  </g>

  <!-- Gold accent particles -->
  <g fill="#fbbf24">
    <circle cx="450" cy="35" r="1.5"><animate attributeName="opacity" values="0.8;0.1;0.8" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="360" cy="170" r="1"><animate attributeName="opacity" values="0.1;0.6;0.1" dur="5s" repeatCount="indefinite"/></circle>
    <circle cx="550" cy="165" r="1.2"><animate attributeName="opacity" values="0.6;0.1;0.6" dur="4s" repeatCount="indefinite"/></circle>
  </g>

  <!-- Central glow -->
  <ellipse cx="450" cy="115" rx="200" ry="60" fill="url(#glow)">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="4s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Main text: 𝔮𝔬𝔰𝔲 -->
  <text x="450" y="132" text-anchor="middle" font-family="serif" font-size="82" font-weight="normal"
        fill="url(#textGrad)" filter="url(#textGlow)" letter-spacing="12">𝔮𝔬𝔰𝔲</text>

  <!-- Decorative line under text -->
  <line x1="340" y1="148" x2="560" y2="148" stroke="#a78bfa" stroke-width="0.8" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.2;0.5" dur="3s" repeatCount="indefinite"/>
  </line>

  <!-- Subtitle -->
  <text x="450" y="178" text-anchor="middle" font-family="monospace" font-size="13"
        fill="#8b9dc3" opacity="0.7" letter-spacing="4">LONGSYSTEMS · RESEARCH ENTITY</text>

  <!-- Bottom ornamental dots -->
  <g fill="#a78bfa" opacity="0.3">
    <circle cx="380" cy="210" r="1"/><circle cx="400" cy="210" r="1"/><circle cx="420" cy="210" r="1"/>
    <circle cx="440" cy="210" r="1.2"/><circle cx="460" cy="210" r="1.2"/>
    <circle cx="480" cy="210" r="1"/><circle cx="500" cy="210" r="1"/><circle cx="520" cy="210" r="1"/>
  </g>

  <!-- Animated scanning line -->
  <line x1="0" y1="215" x2="900" y2="215" stroke="#818cf8" stroke-width="0.3" opacity="0.12">
    <animate attributeName="y1" values="215;225;215" dur="12s" repeatCount="indefinite"/>
    <animate attributeName="y2" values="215;225;215" dur="12s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.12;0.04;0.12" dur="12s" repeatCount="indefinite"/>
  </line>
</svg>
