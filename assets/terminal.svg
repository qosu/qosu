<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 140" width="800" height="140">
  <defs>
    <radialGradient id="tbg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#0d0820"/>
      <stop offset="100%" stop-color="#050510"/>
    </radialGradient>
    <linearGradient id="tgrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="50%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <filter id="tglow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="140" fill="url(#tbg)" rx="8"/>

  <!-- Terminal window chrome -->
  <rect x="0" y="0" width="800" height="28" fill="#1a1030" rx="8"/>
  <rect x="0" y="20" width="800" height="8" fill="#1a1030"/>
  <circle cx="16" cy="14" r="5" fill="#ef4444"/>
  <circle cx="34" cy="14" r="5" fill="#f59e0b"/>
  <circle cx="52" cy="14" r="5" fill="#22c55e"/>
  <text x="400" y="18" text-anchor="middle" font-family="monospace" font-size="10" fill="#6b7280">𝔮𝔬𝔰𝔲@longsystems:~$</text>

  <!-- Cursor blinking -->
  <text x="32" y="65" font-family="monospace" font-size="15" fill="#a78bfa" filter="url(#tglow)">❯</text>

  <!-- Typed text (simulated with opacity animation) -->
  <text x="52" y="65" font-family="monospace" font-size="14" fill="#c4b5fd" opacity="0">
    <tspan>dream to be a great / big father</tspan>
    <animate attributeName="opacity" values="0;1;1" dur="1.5s" begin="0s" fill="freeze"/>
  </text>

  <!-- Line 2 -->
  <text x="32" y="90" font-family="monospace" font-size="15" fill="#a78bfa" filter="url(#tglow)" opacity="0">
    <tspan>❯</tspan>
    <animate attributeName="opacity" values="0;1;1" dur="0.3s" begin="1.5s" fill="freeze"/>
  </text>
  <text x="52" y="90" font-family="monospace" font-size="13" fill="#8b9dc3" opacity="0">
    <tspan>longsystems · research entity · est. 2026</tspan>
    <animate attributeName="opacity" values="0;1;1" dur="1.5s" begin="1.8s" fill="freeze"/>
  </text>

  <!-- Line 3 -->
  <text x="32" y="115" font-family="monospace" font-size="15" fill="#a78bfa" filter="url(#tglow)" opacity="0">
    <tspan>❯</tspan>
    <animate attributeName="opacity" values="0;1;1" dur="0.3s" begin="3.3s" fill="freeze"/>
  </text>
  <text x="52" y="115" font-family="monospace" font-size="12" fill="#6b7280" opacity="0">
    <tspan>formal verification · theoretical physics · ai architecture</tspan>
    <animate attributeName="opacity" values="0;1;1" dur="1.5s" begin="3.6s" fill="freeze"/>
  </text>

  <!-- Cursor blink at end -->
  <rect x="450" y="101" width="8" height="16" fill="#c4b5fd" opacity="0">
    <animate attributeName="opacity" values="0;0;1;1" dur="1s" begin="5.1s" repeatCount="indefinite"/>
  </rect>
</svg>
