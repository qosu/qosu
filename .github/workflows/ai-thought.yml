name: ai-terminal-thought
on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch AI Thought
        id: thought
        run: |
          RESP=$(curl -s -H "X-Profile-Token: ${{ secrets.PROFILE_THOUGHT_SECRET }}" \
                     --max-time 25 https://repo.you/thought)
          echo "thought=$(echo "$RESP" | python3 -c "import sys,json; print(json.load(sys.stdin)['thought'])")" >> $GITHUB_OUTPUT
          echo "time=$(echo "$RESP" | python3 -c "import sys,json; print(json.load(sys.stdin)['time_utc'])")" >> $GITHUB_OUTPUT
          echo "hash=$(echo "$RESP" | python3 -c "import sys,json; print(json.load(sys.stdin)['hash'])")" >> $GITHUB_OUTPUT

      - name: Generate Terminal SVG
        run: |
          python3 << 'PYEOF'
          import os, html

          thought = os.environ["THOUGHT"]
          time_utc = os.environ["TIME"]
          h = os.environ["HASH"]

          # Wrap thought text for terminal display
          lines = []
          current = ""
          for word in thought.split():
              if len(current + " " + word) > 42:
                  lines.append(current)
                  current = word
              else:
                  current = (current + " " + word).strip()
          if current:
              lines.append(current)

          # Pad to 5 lines
          while len(lines) < 5:
              lines.append("")
          display_lines = lines[:5]

          # Build SVG
          line_height = 18
          top_y = 60
          char_w = 8.4

          text_elems = ""
          for i, line in enumerate(display_lines):
              y = top_y + i * line_height
              escaped = html.escape(line)
              text_elems += f'<text x="28" y="{y}" class="line" font-family="monospace" font-size="13" fill="#c9d1d9">{escaped}</text>\n'

          svg = f'''<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 180" width="440" height="180">
            <defs>
              <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#0d1117"/>
                <stop offset="100%" stop-color="#161b22"/>
              </linearGradient>
              <linearGradient id="glow" x1="0" y1="0" x2="1" y2="0">
                <stop offset="0%" stop-color="#3fb950" stop-opacity="0.3"/>
                <stop offset="100%" stop-color="#58a6ff" stop-opacity="0.3"/>
              </linearGradient>
            </defs>
            <rect width="440" height="180" rx="8" fill="url(#bg)" stroke="#30363d" stroke-width="1"/>
            <rect width="440" height="32" rx="8" fill="#161b22"/>
            <rect y="24" width="440" height="8" fill="#161b22"/>
            <circle cx="16" cy="16" r="6" fill="#f85149"/>
            <circle cx="36" cy="16" r="6" fill="#e3b341"/>
            <circle cx="56" cy="16" r="6" fill="#3fb950"/>
            <text x="76" y="21" font-family="monospace" font-size="11" fill="#8b949e">𝔮𝔬𝔰𝔲@github ~ % think</text>
            <line x1="0" y1="32" x2="440" y2="32" stroke="#30363d" stroke-width="0.5"/>
            {text_elems}
            <text x="28" y="{top_y + len(display_lines) * line_height + 6}" font-family="monospace" font-size="13" fill="#3fb950" opacity="0.8">▊</text>
            <text x="380" y="172" font-family="monospace" font-size="8" fill="#30363d">{time_utc} · {h}</text>
          </svg>'''

          with open("assets/terminal.svg", "w") as f:
              f.write(svg)
          print(f"SVG written ({len(svg)} bytes)")
          PYEOF
        env:
          THOUGHT: ${{ steps.thought.outputs.thought }}
          TIME: ${{ steps.thought.outputs.time }}
          HASH: ${{ steps.thought.outputs.hash }}

      - name: Commit & Push
        run: |
          git config user.name "qosu"
          git config user.email "philongkim1806@gmail.com"
          git add assets/terminal.svg
          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi
          git commit -m "update: AI terminal thought"
          git push
